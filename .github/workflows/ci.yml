name: Skywatcher CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps
        run: python -m pip install -r requirements-dev.txt httpx -r server/backend/requirements.txt
      - name: Federation manifest gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("federation.json").read_text())
          required = {
              "schema_version",
              "program_id",
              "repository_full_name",
              "federation_role",
              "hub_parent",
              "hub_callable_commands",
              "canonical_outputs",
              "federation_readiness_gate",
          }
          missing = sorted(required - set(manifest))
          assert not missing, f"federation.json missing required keys: {missing}"
          assert manifest["schema_version"] == "repo_federation_manifest_v1"
          assert manifest["program_id"] == "skywatcher-pr"
          assert manifest["hub_parent"] == "thehub-pr"
          assert "setup" in manifest["hub_callable_commands"]
          assert "test_suite" in manifest["hub_callable_commands"]
          gate = manifest["federation_readiness_gate"]
          assert isinstance(gate.get("ready_for_hub_discovery"), bool)
          assert isinstance(gate.get("ready_for_hub_live_execution"), bool)
          assert isinstance(gate.get("blocking_conditions"), list)
          print("federation manifest gate passed")
          PY
      - name: Validate airspace export contract (test mode passes, production rejects synthetic)
        run: |
          python scripts/validate_airspace_export.py exports/examples/synthetic_airspace_package --mode test
          if python scripts/validate_airspace_export.py exports/examples/synthetic_airspace_package --mode production; then
            echo "ERROR: production mode should reject synthetic rows" && exit 1
          else
            echo "OK: production mode correctly rejected synthetic rows"
          fi
      - name: Validate SATIM calibration sets
        run: python scripts/validate_satim_calibration.py data/satim_calibration
      - name: Tests
        run: pytest -q

  test-imagery:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install imagery deps
        run: python -m pip install -r requirements-imagery.txt pytest
      - name: Imagery tests (mocked; live providers excluded)
        run: pytest tests/test_imagery_*.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Pin npm resolver
        run: npm install --global npm@10.9.2
      - name: Resolve Phase 3 dependencies
        run: npm install --no-audit
      - name: Verify exact certified dependency resolution
        run: npm run verify:resolution
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit and lifecycle tests
        run: npm test
      - name: Console source security gate
        run: npm run security:console
      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
      - name: Build
        run: npm run build
      - name: Performance and license assurance
        run: npm run assurance:console
      - name: CycloneDX SBOM
        run: npm sbom --sbom-format=cyclonedx > ../reports/console/phase3/SBOM.cdx.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase3-frontend-assurance
          path: |
            reports/console/phase3
            frontend/coverage
          if-no-files-found: warn

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Pin npm resolver
        run: npm install --global npm@10.9.2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt httpx -r server/backend/requirements.txt
      - name: Resolve Phase 3 dependencies
        working-directory: frontend
        run: npm install --no-audit
      - name: Verify exact certified dependency resolution
        working-directory: frontend
        run: npm run verify:resolution
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium firefox webkit
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Start same-origin desktop server
        run: |
          python -m uvicorn desktop.app_server:app --host 127.0.0.1 --port 4173 > /tmp/skywatcher-desktop-server.log 2>&1 &
          for i in {1..60}; do
            curl --fail --silent http://127.0.0.1:4173/health && exit 0
            sleep 1
          done
          cat /tmp/skywatcher-desktop-server.log
          exit 1
      - name: Three-browser console acceptance
        working-directory: frontend
        env:
          SKYWATCHER_E2E_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase3-browser-assurance
          path: |
            reports/console/phase3
            frontend/playwright-report
            frontend/test-results
          if-no-files-found: warn

  desktop-console-webgl:
    runs-on: ubuntu-24.04
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Pin npm resolver
        run: npm install --global npm@10.9.2
      - name: Install native GTK/WebKit and software WebGL dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb xauth dbus-x11 python3-pip python3-gi python3-gi-cairo \
            gir1.2-gtk-3.0 gir1.2-webkit2-4.1 libwebkit2gtk-4.1-0 \
            libgl1-mesa-dri libegl1 mesa-utils
      - name: Install desktop Python dependencies
        run: |
          sudo /usr/bin/python3 -m pip install --break-system-packages \
            -r requirements-dev.txt httpx -r server/backend/requirements.txt "pywebview>=5.0"
      - name: Resolve Phase 3 dependencies
        working-directory: frontend
        run: npm install --no-audit
      - name: Verify exact certified dependency resolution
        working-directory: frontend
        run: npm run verify:resolution
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Native pywebview WebGL probe
        env:
          GDK_BACKEND: x11
          PYWEBVIEW_GUI: gtk
          LIBGL_ALWAYS_SOFTWARE: "1"
        run: xvfb-run -a /usr/bin/python3 desktop/console_webgl_probe.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phase3-native-desktop-webgl
          path: reports/console/phase3/DESKTOP_WRAPPER_WEBGL_REPORT.json
          if-no-files-found: warn
