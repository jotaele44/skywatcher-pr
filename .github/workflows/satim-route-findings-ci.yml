name: SATIM Route Findings CI

on:
  push:
    paths:
      - 'tools/satim_route_findings/**'
      - '.github/workflows/satim-route-findings-ci.yml'
  pull_request:
    paths:
      - 'tools/satim_route_findings/**'
      - '.github/workflows/satim-route-findings-ci.yml'

jobs:
  test-route-findings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        working-directory: tools/satim_route_findings
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run tests
        working-directory: tools/satim_route_findings
        run: pytest -q
      - name: Smoke test CLI
        working-directory: tools/satim_route_findings
        run: |
          mkdir -p /tmp/satim_route_findings_out
          satim-route-findings --input tests/fixtures --output /tmp/satim_route_findings_out
          test -f /tmp/satim_route_findings_out/route_findings_report.md
