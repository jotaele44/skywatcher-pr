name: SATIM Engine CI

on:
  push:
    paths:
      - 'tools/satim_engine/**'
      - '.github/workflows/satim-engine-ci.yml'
  pull_request:
    paths:
      - 'tools/satim_engine/**'
      - '.github/workflows/satim-engine-ci.yml'

jobs:
  test-satim-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        working-directory: tools/satim_engine
        run: |
          # PRII_FETCH_HUB: ensure shared federation libs resolve
          if [ ! -d ../thehub-pr ]; then git clone --depth 1 --branch "${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}" https://github.com/jotaele44/thehub-pr.git ../thehub-pr || git clone --depth 1 https://github.com/jotaele44/thehub-pr.git ../thehub-pr; fi
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run tests
        working-directory: tools/satim_engine
        run: pytest -q
      - name: Build wheel and verify packaged config
        working-directory: tools/satim_engine
        run: |
          python -m pip install build
          python -m build --wheel
          python - <<'PY2'
          from pathlib import Path
          import zipfile

          wheels = sorted(Path('dist').glob('*.whl'))
          assert len(wheels) == 1, f'expected one wheel, found {wheels}'
          with zipfile.ZipFile(wheels[0]) as archive:
              names = set(archive.namelist())
          expected = 'satim_engine/config/satim_default.yml'
          assert expected in names, f'{expected} missing from {wheels[0].name}'
          PY2
      - name: Smoke test CLI
        working-directory: tools/satim_engine
        run: |
          mkdir -p /tmp/satim_input /tmp/satim_output
          python - <<'PY2'
          from pathlib import Path
          import zipfile
          p = Path('/tmp/satim_input/sample.zip')
          with zipfile.ZipFile(p, 'w') as z:
              z.writestr('track.csv', 'timestamp,latitude,longitude,altitude,speed,callsign\n2026-01-01T00:00:00Z,18.4,-66.1,1200,100,TEST1\n')
          PY2
          satim --input /tmp/satim_input --output /tmp/satim_output
          test -f /tmp/satim_output/SATIM_TRACK_LEDGER.csv
