name: Skywatcher CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev deps
        run: python -m pip install -r requirements-dev.txt httpx -r server/backend/requirements.txt
      - name: Federation manifest gate
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("federation.json").read_text())
          required = {
              "schema_version",
              "program_id",
              "repository_full_name",
              "federation_role",
              "hub_parent",
              "hub_callable_commands",
              "canonical_outputs",
              "federation_readiness_gate",
          }
          missing = sorted(required - set(manifest))
          assert not missing, f"federation.json missing required keys: {missing}"
          assert manifest["schema_version"] == "repo_federation_manifest_v1"
          assert manifest["program_id"] == "skywatcher-pr"
          assert manifest["hub_parent"] == "thehub-pr"
          assert "setup" in manifest["hub_callable_commands"]
          assert "test_suite" in manifest["hub_callable_commands"]
          gate = manifest["federation_readiness_gate"]
          assert isinstance(gate.get("ready_for_hub_discovery"), bool)
          assert isinstance(gate.get("ready_for_hub_live_execution"), bool)
          assert isinstance(gate.get("blocking_conditions"), list)
          print("federation manifest gate passed")
          PY
      - name: Validate airspace export contract (test mode passes, production rejects synthetic)
        run: |
          python scripts/validate_airspace_export.py exports/examples/synthetic_airspace_package --mode test
          if python scripts/validate_airspace_export.py exports/examples/synthetic_airspace_package --mode production; then
            echo "ERROR: production mode should reject synthetic rows" && exit 1
          else
            echo "OK: production mode correctly rejected synthetic rows"
          fi
      - name: Validate SATIM calibration sets
        run: python scripts/validate_satim_calibration.py data/satim_calibration
      - name: Tests
        run: pytest -q

  test-imagery:
    # Imagery MCP server has its own optional dependency set (requirements-imagery.txt);
    # install it here and run the imagery suite so those tests are exercised in CI.
    # The base `test` job skips them cleanly when the extra is absent.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install imagery deps
        run: python -m pip install -r requirements-imagery.txt pytest
      - name: Imagery tests (mocked; live providers excluded)
        run: pytest tests/test_imagery_*.py -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
