name: Phase 3 Lockfile Generator

on:
  pull_request:
    paths:
      - "frontend/package.json"
      - ".github/workflows/phase3-lockfile.yml"

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Generate npm lockfile
        working-directory: frontend
        run: npm install --package-lock-only --ignore-scripts
      - name: Commit lockfile and retire generator
        run: |
          rm .github/workflows/phase3-lockfile.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json .github/workflows/phase3-lockfile.yml
          if git diff --cached --quiet; then
            echo "No lockfile change required"
            exit 0
          fi
          git commit -m "Update Phase 3 MapLibre lockfile"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
